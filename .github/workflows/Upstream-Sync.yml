name: Upstream Sync

on:
  schedule:
    - cron: '0 0 * * *'  # 每天自动同步，可自定义时间
  workflow_dispatch:      # 保留手动触发功能

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: 同步上游仓库代码
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: mtvpls/MoonTVPlus
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          git_config_user: github-actions[bot]
          git_config_email: github-actions[bot]@users.noreply.github.com
          # 核心修复：添加允许合并不相关历史的参数，解决本次报错
          upstream_pull_args: '--allow-unrelated-histories'
