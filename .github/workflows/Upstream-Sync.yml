name: Upstream Sync

# 触发规则：每天自动同步 + 支持手动点击触发
on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点（北京时间8点）自动同步，可自定义时间
  workflow_dispatch:      # 开启手动触发，在Actions页面可以直接点按钮运行

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: 同步上游仓库代码
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          # 上游仓库地址，固定格式：仓库所有者/仓库名
          upstream_repository: mtvpls/MoonTVPlus
          # 上游仓库要同步的分支名（上游是main就填main，是master就改master）
          upstream_branch: main
          # 你的仓库接收同步的目标分支名
          target_branch: main
          # GitHub内置密钥，无需修改，直接保留即可
          github_token: ${{ secrets.GITHUB_TOKEN }}
